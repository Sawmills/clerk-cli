name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

      - name: Build
        run: cargo build --release

  trunk:
    name: Trunk Code Quality
    # trunk-ignore(actionlint/runner-label): Namespace profile
    runs-on: namespace-profile-sawmills-runner-large
    timeout-minutes: 15
    concurrency:
      group: ${{ github.head_ref || github.ref }}-trunk
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Trunk and Rust artifacts
        # yamllint disable-line rule:line-length
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0
        with:
          cache: rust
          path: |
            /home/runner/.cache/trunk
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Trunk Check
        uses: trunk-io/trunk-action@v1
        with:
          cache: false

  conventional_commits:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
