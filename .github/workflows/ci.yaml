name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

      - name: Build
        run: cargo build --release

  trunk:
    name: Trunk Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ${{ github.head_ref || github.ref }}-trunk
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Trunk Check
        uses: trunk-io/trunk-action@v1
