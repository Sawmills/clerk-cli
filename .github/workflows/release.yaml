name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to release (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: clerk
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: clerk
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: clerk
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: clerk

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../clerk-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clerk-${{ matrix.target }}
          path: clerk-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - id: create_token
        name: Create token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ vars.SAWMILLS_REPO_APP_ID }}
          private_key: ${{ secrets.SAWMILLS_APP_PRIVATE_KEY }}

      - name: Create or update release
        env:
          GH_TOKEN: ${{ steps.create_token.outputs.token }}
        run: |
          ref="${{ inputs.ref || github.ref }}"
          tag="${ref#refs/tags/}"
          tag="${tag#refs/}"

          # Check if release exists
          if gh release view "${tag}" > /dev/null 2>&1; then
            echo "Release ${tag} exists, uploading assets..."
            gh release upload "${tag}" artifacts/*.tar.gz --clobber
          else
            echo "Creating new release ${tag}..."
            gh release create "${tag}" \
              --title "${tag}" \
              --generate-notes \
              artifacts/*.tar.gz
          fi

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ steps.create_token.outputs.token }}
        run: |
          set -euo pipefail

          ref="${{ inputs.ref || github.ref }}"
          tag="${ref#refs/tags/}"
          tag="${tag#refs/}"

          # Support both v* and clerk-cli-v* tag formats
          if [[ "${tag}" == clerk-cli-v* ]]; then
            version="${tag#clerk-cli-v}"
          elif [[ "${tag}" == v* ]]; then
            version="${tag#v}"
          else
            echo "Not a recognized tag format (${tag}); skipping tap update."
            exit 0
          fi
          revision=$(git rev-parse HEAD)

          workdir=$(mktemp -d)
          trap 'rm -rf "${workdir}"' EXIT
          git clone --depth 1 https://github.com/Sawmills/homebrew-tap.git "${workdir}/tap"
          cd "${workdir}/tap"

          mkdir -p Formula
          cat > Formula/clerk.rb << 'FORMULA'
          class Clerk < Formula
            desc "Unofficial Clerk CLI for admin tasks"
            homepage "https://github.com/Sawmills/clerk-cli"
            url "https://github.com/Sawmills/clerk-cli.git",
                using:    :git,
                tag:      "TAG_PLACEHOLDER",
                revision: "REV_PLACEHOLDER"
            version "VER_PLACEHOLDER"

            depends_on "rust" => :build

            def install
              system "cargo", "build", "--release"
              bin.install "target/release/clerk"
            end

            test do
              assert_match "Unofficial Clerk CLI", shell_output("#{bin}/clerk --help")
            end
          end
          FORMULA

          sed -i "s/TAG_PLACEHOLDER/${tag}/g" Formula/clerk.rb
          sed -i "s/REV_PLACEHOLDER/${revision}/g" Formula/clerk.rb
          sed -i "s/VER_PLACEHOLDER/${version}/g" Formula/clerk.rb
          sed -i 's/^          //' Formula/clerk.rb

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to formula."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/clerk.rb
          git commit -m "feat(clerk): update to ${tag}"
          git push origin HEAD:main
